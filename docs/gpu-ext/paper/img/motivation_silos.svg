<svg width="500" height="320" viewBox="0 0 500 320" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Times New Roman', serif; fill: #000; }
    .box-dashed { fill: #fff; stroke: #444; stroke-width: 1.5; stroke-dasharray: 5,5; }
    .box-solid { fill: #f8f9fa; stroke: #000; stroke-width: 1.5; }
    .box-highlight { fill: #fff0f0; stroke: #b00; stroke-width: 2; }

    .label { font-size: 14px; font-weight: bold; text-anchor: middle; }
    .subtext { font-size: 11px; font-style: italic; text-anchor: middle; fill: #444; }
    .gap-label { font-size: 12px; font-weight: bold; fill: #b00; text-anchor: middle; }

    .arrow { stroke: #000; stroke-width: 1.5; marker-end: url(#arrowhead); fill: none; }
    .arrow-broken { stroke: #b00; stroke-width: 1.5; marker-end: url(#bar); stroke-dasharray: 4,4; fill: none; }
    .arrow-broken-line { stroke: #b00; stroke-width: 1.5; stroke-dasharray: 4,4; fill: none; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000" />
    </marker>
    <marker id="bar" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
       <rect x="0" y="0" width="2" height="8" fill="#b00" />
       <line x1="0" y1="0" x2="8" y2="8" stroke="#b00" stroke-width="1.5" />
       <line x1="8" y1="0" x2="0" y2="8" stroke="#b00" stroke-width="1.5" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#b00" />
    </marker>
  </defs>

  <!-- TOP LAYER: User Space Silos -->
  <text x="50" y="35" font-weight="bold" font-size="12" fill="#444">User Space</text>

  <!-- App 1 -->
  <rect x="120" y="10" width="100" height="50" rx="2" class="box-dashed" />
  <text x="170" y="38" class="label">Inference</text>

  <!-- App 2 -->
  <rect x="240" y="10" width="100" height="50" rx="2" class="box-dashed" />
  <text x="290" y="38" class="label">Vector DB</text>

  <!-- MIDDLE LAYER: Driver -->
  <rect x="120" y="110" width="220" height="60" rx="2" class="box-solid" />
  <text x="230" y="135" class="label">OS Kernel Driver</text>
  <text x="230" y="155" class="subtext">"One-size-fits-all" Policy</text>

  <!-- BOTTOM LAYER: Device -->
  <rect x="120" y="230" width="220" height="50" rx="2" class="box-highlight" />
  <text x="230" y="250" class="label">GPU Device</text>
  <text x="230" y="268" class="subtext">(Fine-grained Execution State)</text>


  <!-- ARROWS -->

  <!-- Downward: Commands (Works) -->
  <path d="M 150 60 L 150 105" class="arrow" />
  <text x="145" y="85" font-size="10" text-anchor="end" fill="#666">ioctl</text>

  <path d="M 150 170 L 150 225" class="arrow" />
  <text x="145" y="200" font-size="10" text-anchor="end" fill="#666">CmdQ</text>

  <!-- Upward: Feedback (BROKEN) -->

  <!-- Device to Driver -->
  <path d="M 310 230 L 310 175" class="arrow-broken-line" marker-end="url(#arrowhead-red)" />

  <text x="325" y="210" class="gap-label" text-anchor="start">Invisible State</text>

  <!-- App to Driver -->
  <path d="M 310 60 L 310 105" class="arrow-broken-line" marker-end="url(#arrowhead-red)" />

  <text x="325" y="85" class="gap-label" text-anchor="start">Unprogrammable</text>

</svg>
